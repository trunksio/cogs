id = "cogs"
name = "Cogs"
description = "Graph wiki engine for markdown vaults: wikilink language server with backlinks, graph database, and knowledge-graph visualization"
version = "0.1.0"
schema_version = 1
authors = ["Lewis Crawford <lewis@trunks.io>"]
repository = "https://github.com/trunksio/cogs"

[language_servers.cogs]
name = "Cogs LSP"
languages = ["Markdown"]

[context_servers.cogs]

[slash_commands.cogs-init]
description = "Scaffold this project as a Karpathy-style cogs wiki (the agent writes the files)"
requires_argument = false

[slash_commands.cogs-graph]
description = "Show how to open the cogs knowledge-graph visualization"
requires_argument = false
