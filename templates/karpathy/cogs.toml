# cogs vault configuration — Karpathy-style three-layer wiki.
# See AGENTS.md for the operating manual.

[vault]
notes = ["wiki/**/*.md"]
exclude = ["wiki/index.md", "wiki/log.md", "wiki/README.md", "wiki/_lint/**"]
id_strip_prefix = "wiki/"

[resources]
# The immutable raw layer. Binary files (PDFs etc.) describe themselves via a
# sibling <name>.meta.md with the same frontmatter.
paths = ["raw/**/*"]
exclude = ["raw/README.md"]

[kinds]
values = ["concept", "entity", "position", "question", "source", "moc"]
unknown = "warn"

# Body [[wikilinks]] become CITES edges:
[[edges]]
name = "CITES"
source = "wikilinks"

# Frontmatter `source_refs:` lists point at raw/ files:
[[edges]]
name = "SOURCE_OF"
source = "frontmatter"
field = "source_refs"
target = "resource"

[[edges]]
name = "CONTRADICTS"
source = "frontmatter"
field = "contradicts"

[[edges]]
name = "SUPERSEDES"
source = "frontmatter"
field = "supersedes"

[tags]
field = "tags"
inline = false

[diagnostics]
broken_link = "warn"
ambiguous_link = "warn"
required_fields = { source = ["source_refs"] }
stale_after_days = 180

[embeddings]
# Flip to true once an embedding model is served (omlx OpenAI-compatible
# endpoint by default). Powers semantic search, the similarity overlay in the
# graph, and similar_notes/semantic_search MCP tools. Match `dim` to the model.
enabled = false
provider = "omlx"                        # omlx | openai | ollama
model = "<your-omlx-embedding-model>"    # must match omlx /v1/models
dim = 0                                  # set to the model's output dimension
endpoint = "http://localhost:8000/v1"
char_cap = 7000
exclude_kinds = ["source", "moc"]

[llm]
# Chat model for `cogs ask` and ingest. Local on Apple Silicon via omlx
# (`omlx serve <model>`); also openai | anthropic (set the API key env var).
provider = "omlx"
model = "qwen3.6-35b"                    # must match the id omlx exposes at /v1/models
base_url = "http://localhost:8000/v1"
max_tokens = 2048

# [ingest] — where `cogs ingest` writes and what it stamps. These are the
# defaults (matching this scaffold); shown for discoverability. Other vault
# shapes (e.g. OKF — see examples/okf-nameless.cogs.toml) override them.
# [ingest]
# source_dir = "sources"                 # generated source pages
# source_kind = "source"                 # kind stamped on them (distill mines this)
# new_pages = { entities = "entity", concepts = "concept" }   # dir -> kind
# log_file = "log.md"                    # audit log ("" disables)
# owner = "llm"                          # owner: field ("" omits)
# stamp_model = true                     # ingested_by: <model> provenance

[server]
port = 7117
