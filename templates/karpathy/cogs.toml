# cogs vault configuration — Karpathy-style three-layer wiki.
# See AGENTS.md for the operating manual.

[vault]
notes = ["wiki/**/*.md"]
exclude = ["wiki/index.md", "wiki/log.md", "wiki/README.md", "wiki/_lint/**"]
id_strip_prefix = "wiki/"

[resources]
# The immutable raw layer. Binary files (PDFs etc.) describe themselves via a
# sibling <name>.meta.md with the same frontmatter.
paths = ["raw/**/*"]
exclude = ["raw/README.md"]

[kinds]
values = ["concept", "entity", "position", "question", "source", "moc"]
unknown = "warn"

# Body [[wikilinks]] become CITES edges:
[[edges]]
name = "CITES"
source = "wikilinks"

# Frontmatter `source_refs:` lists point at raw/ files:
[[edges]]
name = "SOURCE_OF"
source = "frontmatter"
field = "source_refs"
target = "resource"

[[edges]]
name = "CONTRADICTS"
source = "frontmatter"
field = "contradicts"

[[edges]]
name = "SUPERSEDES"
source = "frontmatter"
field = "supersedes"

[tags]
field = "tags"
inline = false

[diagnostics]
broken_link = "warn"
ambiguous_link = "warn"
required_fields = { source = ["source_refs"] }
stale_after_days = 180

[embeddings]
# Flip to true once an embedding provider is available (Ollama by default:
# `ollama pull nomic-embed-text`). Powers semantic search, the similarity
# overlay in the graph, and similar_notes/semantic_search MCP tools.
enabled = false
provider = "ollama"
model = "nomic-embed-text"
dim = 768
endpoint = "http://localhost:11434"
char_cap = 7000
exclude_kinds = ["source", "moc"]

[server]
port = 7117
