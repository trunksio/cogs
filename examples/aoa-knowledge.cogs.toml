# cogs config reproducing aoa-knowledge's sync_graph.py schema.
# Drop this in the vault root as cogs.toml (and gitignore .cogs/) to adopt.

[vault]
notes = ["wiki/**/*.md"]
exclude = ["wiki/index.md", "wiki/log.md", "wiki/README.md", "wiki/_lint/**"]
id_strip_prefix = "wiki/"

[resources]
paths = ["raw/**/*"]
exclude = ["raw/README.md"]

[kinds]
values = ["concept", "entity", "position", "question", "source", "moc"]
unknown = "warn"

[[edges]]
name = "CITES"
source = "wikilinks"

[[edges]]
name = "SOURCE_OF"
source = "frontmatter"
field = "source_refs"
target = "resource"

[[edges]]
name = "CONTRADICTS"
source = "frontmatter"
field = "contradicts"

[[edges]]
name = "SUPERSEDES"
source = "frontmatter"
field = "supersedes"

[tags]
field = "tags"
inline = false

[diagnostics]
broken_link = "warn"
ambiguous_link = "warn"
required_fields = { source = ["source_refs"] }
stale_after_days = 180

[embeddings]
enabled = true
provider = "omlx"                        # omlx | openai | ollama
model = "Qwen3-Embedding-0.6B-8bit"      # omlx /v1/models id
dim = 1024
endpoint = "http://127.0.0.1:8000/v1"    # omlx OpenAI-compatible endpoint
api_key_env = "OMLX_API_KEY"             # bearer key for omlx (kept out of the file)
# Qwen3-Embedding is asymmetric: queries carry a retrieval instruction,
# documents are embedded bare. ~1-5% retrieval gain.
query_instruction = "Given a question, retrieve wiki notes that answer it"
char_cap = 7000
exclude_kinds = ["source", "moc"]

[llm]
provider = "omlx"                        # omlx | openai | anthropic | ollama
model = "Qwen3.6-35B-A3B-UD-MLX-4bit"    # omlx /v1/models id
base_url = "http://127.0.0.1:8000/v1"
api_key_env = "OMLX_API_KEY"             # omlx requires a bearer key; keep it out of the file
max_tokens = 2048

[server]
port = 7117
